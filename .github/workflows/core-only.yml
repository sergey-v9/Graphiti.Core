name: Graphiti Core C# Core

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: graphiti-core-csharp-core-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-only:
    name: Core-only verifier
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: "10.0.x"
      - name: Run core-only verifier
        shell: pwsh
        run: ./eng/Verify-GraphitiCoreOnly.ps1
