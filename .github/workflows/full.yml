name: Graphiti Core C# Full

# Runs the full verifier, including the LadybugDB driver package.
# Requires GitHub Packages "Manage Actions access" read permission for this repository
# on the LadybugDB package family in the sergey-v9 account-scoped feed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: graphiti-core-csharp-full-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full:
    name: Full verifier
    # Keep Ladybug-inclusive verification in one job. The native package has hung when multiple
    # dotnet test runs execute concurrently across worktrees/jobs.
    # The fork LadybugDB Linux package currently loads the upstream FTS extension from
    # ~/.lbdb/extension and fails with an ABI mismatch there. Keep this workflow focused on
    # authenticated package restore plus the full Graphiti verifier on the known-good RID.
    runs-on: windows-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NuGetPackageSourceCredentials_github_ladybug: "Username=sergey-v9;Password=${{ secrets.GITHUB_TOKEN }};ValidAuthenticationTypes=Basic"
    steps:
      - name: Preserve LF checkout
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: "10.0.x"
      - name: Run full verifier
        shell: pwsh
        run: ./eng/Verify-GraphitiCore.ps1
