name: Graphiti Core C# Live Provider

on:
  workflow_dispatch:
  schedule:
    - cron: "23 5 * * 1"

permissions:
  contents: read
  packages: read

concurrency:
  group: graphiti-core-csharp-live-provider-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-provider-eval:
    name: Live provider and eval
    runs-on: windows-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_CHAT_MODEL: ${{ vars.OPENAI_CHAT_MODEL }}
      OPENAI_SMALL_MODEL: ${{ vars.OPENAI_SMALL_MODEL }}
      OPENAI_RERANKER_MODEL: ${{ vars.OPENAI_RERANKER_MODEL }}
      OPENAI_EMBEDDING_MODEL: ${{ vars.OPENAI_EMBEDDING_MODEL }}
      OPENAI_EMBEDDING_DIMENSIONS: ${{ vars.OPENAI_EMBEDDING_DIMENSIONS }}
      GRAPHITI_EVAL_BASELINE_PATH: samples\Graphiti.Eval\baselines\baseline_graph_results.json
      GRAPHITI_EVAL_FAIL_LOUD: "1"
      GRAPHITI_EVAL_REQUIRE_BASELINE: "1"
      GRAPHITI_EVAL_MIN_QA_CORRECT: ${{ vars.GRAPHITI_EVAL_MIN_QA_CORRECT }}
      NuGetPackageSourceCredentials_github_ladybug: "Username=sergey-v9;Password=${{ secrets.GITHUB_TOKEN }};ValidAuthenticationTypes=Basic"
    steps:
      - name: Preserve LF checkout
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: "10.0.x"
      - name: Require OpenAI secret
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:OPENAI_API_KEY)) {
            throw "OPENAI_API_KEY secret is required for the fail-loud live-provider workflow."
          }
      - name: Run live provider validation
        shell: pwsh
        run: ./eng/Run-OpenAIProviderValidation.ps1
      - name: Run graph-building eval against baseline
        shell: pwsh
        run: dotnet run --project samples\Graphiti.Eval\Graphiti.Eval.csproj --no-build --no-restore
      - name: Run retrieval-QA eval
        shell: pwsh
        run: dotnet run --project samples\Graphiti.Eval\Graphiti.Eval.csproj --no-build --no-restore -- --qa
